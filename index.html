<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SGPD - Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #2563eb, #1e40af);
    min-height: 100vh;
}

.menu {
    background: rgba(0,0,0,0.2);
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
}

.menu button {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
}

.container {
    width: 400px;
    background: white;
    margin: 120px auto;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
}

input {
    width: 100%;
    padding: 14px;
    margin-bottom: 16px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
}

button.main {
    width: 100%;
    padding: 14px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
}
</style>

<script>
function irPara(p) { window.location.href = p; }
</script>
</head>

<body>

<div class="menu">
    <strong>SGPD</strong>
    <button onclick="irPara('login.html')">Login</button>
</div>

<div class="container">
    <h2>Acesso ao sistema</h2>
    <input placeholder="Usuário">
    <input type="password" placeholder="Senha">
    <button class="main" onclick="irPara('processos.html')">Entrar no sistema</button>
</div>

</body>
</html>
