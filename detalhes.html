<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SGPD - Detalhes</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f1f5f9;
}

.menu {
    background: #1e40af;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    color: white;
}

.menu button {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 8px 14px;
    border-radius: 8px;
}

.container {
    width: 500px;
    background: white;
    margin: 80px auto;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

button.main {
    background: #1e40af;
    color: white;
    padding: 14px;
    border: none;
    border-radius: 10px;
    width: 100%;
}
</style>

<script>
function irPara(p) { window.location.href = p; }
</script>
</head>

<body>

<div class="menu">
    <strong>SGPD</strong>
    <div>
        <button onclick="irPara('processos.html')">Processos</button>
        <button onclick="irPara('tramitacao.html')">Tramitar</button>
        <button onclick="irPara('login.html')">Sair</button>
    </div>
</div>

<div class="container">
    <h2>Detalhes do Processo</h2>
    <p><b>Número:</b> 123</p>
    <p><b>Status:</b> Em análise</p>
    <button class="main" onclick="irPara('tramitacao.html')">Tramitar processo</button>
</div>

</body>
</html>
